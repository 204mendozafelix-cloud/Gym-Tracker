<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --input-bg: #2c2c2e;
            --accent-color: #30d158;
            --pb-color: #ffd60a;
            --text-color: #ffffff;
            --text-secondary: #8e8e93;
            --danger-color: #ff453a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            -webkit-user-select: none;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 22px;
            margin: 0;
            font-weight: 700;
            color: var(--accent-color);
            text-align: center;
            flex: 1;
        }

        .btn-back {
            background: var(--card-bg);
            border: none;
            color: var(--accent-color);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-item {
            background-color: var(--card-bg);
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .menu-item::after {
            content: '›';
            font-size: 22px;
            color: var(--text-secondary);
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .pb-card {
            background: linear-gradient(135deg, #2c2c2e 0%, #1c1c1e 100%);
            border: 1px solid var(--pb-color);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .pb-title {
            font-size: 13px;
            color: var(--pb-color);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .pb-value {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
        }

        .pb-date {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: right;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid #3a3a3c;
            border-radius: 10px;
            color: var(--text-color);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        .row {
            display: flex;
            gap: 8px;
        }

        .row .form-group.weight-input-group {
            flex: 2;
        }

        .row .form-group.unit-select-group {
            flex: 1;
        }

        .row .form-group.reps-input-group {
            flex: 1.5;
        }

        button.btn-primary {
            width: 100%;
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 5px;
        }

        .history-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2c2c2e;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-info span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .log-data {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-color);
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            font-size: 18px;
            margin-left: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <button id="btn-back" class="btn-back" onclick="goBack()" style="visibility: hidden;">‹ Volver</button>
        <h1 id="title">Músculos</h1>
        <div style="width: 60px;"></div>
    </div>

    <div id="screen-muscles" class="screen active">
        <div class="menu-list" id="muscles-list"></div>
    </div>

    <div id="screen-exercises" class="screen">
        <div class="menu-list" id="exercises-list"></div>
    </div>

    <div id="screen-detail" class="screen">
        
        <div class="pb-card">
            <div>
                <div class="pb-title">🏆 Personal Best (PB)</div>
                <div class="pb-value" id="pb-display">---</div>
            </div>
            <div class="pb-date" id="pb-date-display">Sin registros</div>
        </div>

        <div class="card">
            <div class="row">
                <div class="form-group weight-input-group">
                    <label for="weight">Peso</label>
                    <input type="number" id="weight" placeholder="100" inputmode="decimal">
                </div>
                <div class="form-group unit-select-group">
                    <label for="unit">Unidad</label>
                    <select id="unit">
                        <option value="kg">kg</option>
                        <option value="lb">lb</option>
                    </select>
                </div>
                <div class="form-group reps-input-group">
                    <label for="reps">Reps</label>
                    <input type="number" id="reps" placeholder="10" inputmode="numeric">
                </div>
            </div>
            <button class="btn-primary" onclick="guardarSerie()">Registrar Serie</button>
        </div>

        <div class="history-title">Histórico de este ejercicio</div>
        <div class="card" id="history-container"></div>
    </div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    // BASE DE DATOS PERSONALIZADA
    const dbGym = {
        "Pecho": [
            "Barra horizontal",
            "Barra inclinada",
            "Mancuerna horizontal",
            "Mancuerna inclinada",
            "Pecfly maquin",
            "Pechly mancuerna",
            "Polea subiendo",
            "Polea bajando"
        ],
        "Hombro": [
            "Laterales mancuerna",
            "Laterales polea",
            "Frontal mancuerna",
            "Frontal polea",
            "Press maquina",
            "Press mancuerna",
            "Press barra"
        ],
        "Tríceps": [
            "Extensión cuerda",
            "Extensión barra",
            "Kick back polea",
            "Copa polea",
            "Copa mancuerna",
            "Fondos"
        ],
        "Espalda": [
            "Jalón abierto",
            "Jalón cerrado",
            "Pull ups",
            "Remo maquina",
            "Remo disco",
            "Remo mancuerna",
            "Remo barra",
            "Remo polea cerrado",
            "Pull over",
            "Facepull"
        ],
        "Bíceps": [
            "Martillo mancuerna",
            "Predicador barra",
            "Curl barra libre",
            "Curl mancuerna",
            "Curl barra polea",
            "Martillo polea",
            "Cocentrado",
            "Curl bayesian"
        ],
        "Trapecio": [
            "Remo al cuello",
            "Encojimiento de hombro"
        ],
        "Pierna": [
            "Prensa",
            "Squad libre",
            "Squad smith",
            "Peso muerto mancuerna",
            "Peso muerto barra",
            "Peso muerto smith",
            "Extensión cuádriceps",
            "Femoral acostado",
            "Femoral sentado",
            "Abducción",
            "Aducción",
            "Sentadilla sumo",
            "Sentadilla hack",
            "Hip thrust"
        ]
    };

    let selectedMuscle = null;
    let selectedExercise = null;

    document.addEventListener('DOMContentLoaded', initApp);

    function initApp() {
        renderMuscles();
    }

    function renderMuscles() {
        const container = document.getElementById('muscles-list');
        container.innerHTML = Object.keys(dbGym).map(muscle => `
            <div class="menu-item" onclick="selectMuscle('${muscle}')">
                ${muscle}
            </div>
        `).join('');
    }

    function selectMuscle(muscle) {
        selectedMuscle = muscle;
        document.getElementById('title').innerText = muscle;
        document.getElementById('btn-back').style.visibility = 'visible';

        const container = document.getElementById('exercises-list');
        const exercises = dbGym[muscle] || [];

        container.innerHTML = exercises.map(ex => `
            <div class="menu-item" onclick="selectExercise('${ex}')">
                ${ex}
            </div>
        `).join('');

        showScreen('screen-exercises');
    }

    function selectExercise(exercise) {
        selectedExercise = exercise;
        document.getElementById('title').innerText = exercise;

        cargarDatosEjercicio();
        showScreen('screen-detail');
    }

    function goBack() {
        const activeScreen = document.querySelector('.screen.active').id;

        if (activeScreen === 'screen-detail') {
            document.getElementById('title').innerText = selectedMuscle;
            showScreen('screen-exercises');
        } else if (activeScreen === 'screen-exercises') {
            document.getElementById('title').innerText = 'Músculos';
            document.getElementById('btn-back').style.visibility = 'hidden';
            selectedMuscle = null;
            showScreen('screen-muscles');
        }
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // Guardar Serie con la Unidad Seleccionada (kg / lb)
    function guardarSerie() {
        const weightInput = document.getElementById('weight');
        const unitSelect = document.getElementById('unit');
        const repsInput = document.getElementById('reps');

        const weight = parseFloat(weightInput.value);
        const unit = unitSelect.value;
        const reps = parseInt(repsInput.value);

        if (isNaN(weight) || isNaN(reps)) {
            alert('Por favor introduce un peso y repeticiones válidos');
            return;
        }

        const nuevoRegistro = {
            id: Date.now(),
            exercise: selectedExercise,
            weight: weight,
            unit: unit || 'kg',
            reps: reps,
            date: new Date().toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: '2-digit' })
        };

        let historial = JSON.parse(localStorage.getItem('gym_logs')) || [];
        historial.unshift(nuevoRegistro);
        localStorage.setItem('gym_logs', JSON.stringify(historial));

        weightInput.value = '';
        repsInput.value = '';

        cargarDatosEjercicio();
    }

    // Convertir a kg equivalente para comparar PBs de forma justa
    function getWeightInKg(item) {
        const unit = item.unit || 'kg';
        return unit === 'lb' ? item.weight * 0.453592 : item.weight;
    }

    function cargarDatosEjercicio() {
        const container = document.getElementById('history-container');
        const pbDisplay = document.getElementById('pb-display');
        const pbDateDisplay = document.getElementById('pb-date-display');

        let historial = JSON.parse(localStorage.getItem('gym_logs')) || [];
        const logsEjercicio = historial.filter(item => item.exercise === selectedExercise);

        // --- CÁLCULO DEL PB (PERSONAL BEST) ---
        if (logsEjercicio.length > 0) {
            const pb = logsEjercicio.reduce((max, item) => {
                const itemKg = getWeightInKg(item);
                const maxKg = getWeightInKg(max);

                if (itemKg > maxKg) return item;
                if (itemKg === maxKg && item.reps > max.reps) return item;
                return max;
            }, logsEjercicio[0]);

            const unitText = pb.unit || 'kg';
            pbDisplay.innerText = `${pb.weight} ${unitText} × ${pb.reps} reps`;
            pbDateDisplay.innerText = `Fecha: ${pb.date}`;
        } else {
            pbDisplay.innerText = '---';
            pbDateDisplay.innerText = 'Sin Récord Registrado';
        }

        // --- RENDER DEL HISTORIAL ---
        if (logsEjercicio.length === 0) {
            container.innerHTML = '<div style="text-align:center; color: var(--text-secondary);">Sin registros para este ejercicio</div>';
            return;
        }

        container.innerHTML = logsEjercicio.map(item => {
            const unitText = item.unit || 'kg';
            return `
                <div class="log-item">
                    <div class="log-info">
                        <span>${item.date}</span>
                    </div>
                    <div>
                        <span class="log-data">${item.weight} ${unitText} × ${item.reps} reps</span>
                        <button class="delete-btn" onclick="eliminarRegistro(${item.id})">✕</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function eliminarRegistro(id) {
        let historial = JSON.parse(localStorage.getItem('gym_logs')) || [];
        historial = historial.filter(item => item.id !== id);
        localStorage.setItem('gym_logs', JSON.stringify(historial));
        cargarDatosEjercicio();
    }
</script>
</body>
</html>
